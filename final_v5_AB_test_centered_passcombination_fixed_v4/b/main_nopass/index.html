<script>
/* AB_NAV_INJECT_START */
(function () {
  const HOME_SCREEN = "mainyespass";
  const CURRENT_SCREEN = "main_nopass";
  const go = (screen) => { window.location.href = `../${screen}/index.html`; };
  const bind = (selector, screen) => {
    document.querySelectorAll(selector).forEach((el) => {
      el.style.cursor = "pointer";
      el.setAttribute("role", "button");
      el.addEventListener("click", function(e) {
        e.preventDefault();
        e.stopPropagation();
        go(screen);
      });
    });
  };
  const bindText = (text, screen) => {
    document.querySelectorAll("div, button, a, p, span").forEach((el) => {
      if ((el.textContent || "").replace(/\s+/g, "").includes(text.replace(/\s+/g, ""))) {
        el.style.cursor = "pointer";
        el.setAttribute("role", "button");
        el.addEventListener("click", function(e) {
          e.preventDefault();
          e.stopPropagation();
          go(screen);
        });
      }
    });
  };

  // 공통 하단 네비게이션
  bind(".home-btn", HOME_SCREEN);
  bind(".profile-btn", "profile");

  // A 팝업: X 닫기 → main_nopass
  bind(".x-btn", HOME_SCREEN);

  // B 상단 쿠팡패스 버튼 → passhub
  bind(".pass-btn", "passhub");

  // profile의 passnowuse / 더블패스 카드 → passhub
  bind(".passnowuse, .passnowuse-btn, .pass-now-use, .pass-nowuse, .nowusepass, .nowusepass-profile", "passhub");
  bindText("더블패스", "passhub");

  // passhub의 각 패스 > 버튼 → passdetail
  bind(".arrow-btn, .arrow-btn-2, .arrow-btn-3, .arrow-btn-4, .arrow-btn-5", "passdetail");

  // 뒤로가기 → passhub
  bind(".arrow-left, .back-btn", "passhub");

  // CTA 규칙
  // '지금 바로 시청하기' 버튼은 전부 buyresult
  bind("#watchButton", "buyresult");
  bindText("지금바로시청하기", "buyresult");

  // '지금 패스 구독하기', '지금 바로 패스 이용하기', '구독하러가기'는 전부 pass_combination
  bind(".subscribe-btn, .nowusepass-btn", "pass_combination");
  bindText("지금패스구독하기", "pass_combination");
  bindText("지금바로패스이용하기", "pass_combination");
  bindText("구독하러가기", "pass_combination");
})();
/* AB_NAV_INJECT_END */
</script>
